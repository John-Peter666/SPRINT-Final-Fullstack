<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Sistema Acadêmico - Pro Edition</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="loginTela" class="login-container">
<div class="login-card">
<h2>Login</h2>
<input id="login" placeholder="E-mail ou usuário">
<input id="senha" type="password" placeholder="Sua senha">
<button onclick="login()">Autenticar no Sistema</button>
</div>
</div>

<div id="sistema" style="display:none;">
<nav>
<header>
<h1>Sistema Acadêmico</h1>
</header>
<button onclick="mostrar('dashboard')">Painel de Controle</button>
<button onclick="mostrar('boletim')">Boletim Escolar</button>
<button onclick="mostrar('aluno')">Gestão de Alunos</button>
<button onclick="mostrar('professor')">Gestão de Professores</button>
<button onclick="mostrar('disciplina')">Disciplinas</button>
<button onclick="mostrar('turma')">Turmas Acadêmicas</button>
<button onclick="mostrar('matricula')">Controle de Matrículas</button>
<button onclick="logout()">Encerrar Sessão</button>
</nav>

<div class="container">
<div id="conteudo"></div>
</div>
</div>

<script>
const BASE = "http://localhost:5244/api";

// Tenta puxar o cache já salvo no localStorage; se não existir, começa vazio
let cacheMatriculas = JSON.parse(localStorage.getItem("local_matriculas")) || [];
let dadosDashboardBase = JSON.parse(localStorage.getItem("local_dashboard")) || {
alunosCadastrados: 0,
professoresCadastrados: 0,
disciplinasAtivas: 0,
totalMatriculasEfetuadas: 0,
mediaGeralDaEscola: 0
};

function login() {
fetch(BASE + "/auth/login", {
method: "POST",
headers: {"Content-Type": "application/json"},
body: JSON.stringify({
login: document.getElementById("login").value,
senha: document.getElementById("senha").value
})
})
.then(r => {
if (!r.ok) throw "Login inválido";
return r.json();
})
.then(data => {
localStorage.setItem("token", data.token);
iniciarSistema();
})
.catch(err => {
console.log(err);
alert("Acesso negado. Verifique os dados.");
});
}

function iniciarSistema() {
document.getElementById("loginTela").style.display = "none";
document.getElementById("sistema").style.display = "flex";
mostrar('dashboard');
}

function logout() {
localStorage.clear();
location.reload();
}

if (localStorage.getItem("token")) iniciarSistema();

// Puxa do banco apenas as matrículas novas que ainda não temos no localStorage
function sincronizarCacheMatriculas() {
return fetch(BASE + "/MatriculaDisciplina", {
headers: { "Authorization": "Bearer " + localStorage.getItem("token") }
})
.then(r => r.ok ? r.json() : [])
.then(data => {
data.forEach(m => {
const idm = m.idMatricula || m.idmatricula || m.id;
let jaExiste = cacheMatriculas.find(c => Number(c.idMatricula || c.idmatricula || c.id) === Number(idm));
if (!jaExiste) {
cacheMatriculas.push(m);
}
});
localStorage.setItem("local_matriculas", JSON.stringify(cacheMatriculas));
})
.catch(() => {});
}

function api(url, metodo = "GET", body = null) {
return fetch(BASE + url, {
method: metodo,
headers: {
"Content-Type": "application/json",
"Authorization": "Bearer " + localStorage.getItem("token")
},
body: body ? JSON.stringify(body) : null
})
.then(async r => {
if (!r.ok) throw await r.text();
const text = await r.text();
return text ? JSON.parse(text) : null;
});
}

function mostrar(tipo) {
const conteudo = document.getElementById("conteudo");

if (tipo === "dashboard") {
conteudo.innerHTML = `
<div class="form-card">
<h2>Visão Geral do Estabelecimento</h2>
<div id="dashboard-cards" class="dashboard-grid">
<div class="dash-card loading">Sincronizando banco de dados...</div>
</div>
</div>
`;
carregarDashboard();
}

if (tipo === "boletim") {
conteudo.innerHTML = `
<div class="form-card">
<h2>Lançamento de Avaliações</h2>
<div style="margin-bottom: 25px; display: flex; gap: 12px; flex-wrap: wrap;">
<input id="notaMatriculaId" placeholder="Matrícula" type="number">
<input id="notaValor" placeholder="Nota Final" type="text">
<button onclick="lancarNota()" style="background: #10b981; color: #fff;">Confirmar Nota</button>
</div>
<hr style="border: 0; border-top: 1px solid #1e293b; margin: 40px 0;">
<h2>Histórico por Discente</h2>
<div style="margin-bottom: 15px; display: flex; gap: 12px;">
<input id="buscaAlunoId" placeholder="Código do Aluno" type="number">
<button onclick="carregarBoletim()">Gerar Boletim</button>
</div>
<div id="boletim-resultado">
<p style="color: #94a3b8; margin-top:20px;">Aguardando entrada de dados...</p>
</div>
</div>
`;
}

if (tipo === "aluno") {
conteudo.innerHTML = `
<div class="form-card">
<h2>Administração de Alunos</h2>
<input id="nome" placeholder="Nome do Aluno">
<input id="email" placeholder="E-mail Acadêmico">
<button onclick="cadastrarAluno()">Incluir Registro</button>
<button onclick="listarAlunos()">Consultar Base</button>
</div>
<div id="lista"></div>
`;
}

if (tipo === "professor") {
conteudo.innerHTML = `
<div class="form-card">
<h2>Quadro Docente</h2>
<input id="nomeProf" placeholder="Nome Completo">
<input id="emailProf" placeholder="E-mail Institucional">
<button onclick="cadastrarProfessor()">Incluir Professor</button>
<button onclick="listarProfessores()">Consultar Base</button>
</div>
<div id="listaProfessores"></div>
`;
}

if (tipo === "disciplina") {
conteudo.innerHTML = `
<div class="form-card">
<h2>Grade Curricular</h2>
<input id="nomeDisc" placeholder="Nome da Matéria">
<button onclick="cadastrarDisciplina()">Nova Disciplina</button>
<button onclick="listarDisciplinas()">Consultar Ativas</button>
</div>
<div id="lista"></div>
`;
}

if (tipo === "turma") {
conteudo.innerHTML = `
<div class="form-card">
<h2>Grupos Acadêmicos</h2>
<input id="prof" placeholder="ID Docente">
<input id="disc" placeholder="ID Disciplina">
<button onclick="cadastrarTurma()">Gerar Turma</button>
<button onclick="listarTurmas()">Consultar Ativas</button>
</div>
<div id="lista"></div>
`;
}

if (tipo === "matricula") {
conteudo.innerHTML = `
<div class="form-card">
<h2>Registro de Matrículas</h2>
<input id="aluno" placeholder="ID Aluno">
<input id="turma" placeholder="ID Turma">
<button onclick="cadastrarMatricula()">Processar Vínculo</button>
<button onclick="listarMatriculas()">Listar Registros</button>
</div>
<div id="lista"></div>
`;
}
}

function calcularMediaGlobalLocal() {
let matriculasComNota = cacheMatriculas.filter(m => m.nota !== undefined && m.nota !== null && m.nota !== "N/A" && !isNaN(m.nota));
if (matriculasComNota.length === 0) return dadosDashboardBase.mediaGeralDaEscola || 0;
let soma = matriculasComNota.reduce((acc, m) => acc + Number(m.nota), 0);
return soma / matriculasComNota.length;
}

function carregarDashboard() {
const grid = document.getElementById("dashboard-cards");
sincronizarCacheMatriculas().then(() => {
api("/Dashboard/estatisticas")
.then(data => {
dadosDashboardBase = data;
localStorage.setItem("local_dashboard", JSON.stringify(dadosDashboardBase));
renderizarDashboardCards(grid);
})
.catch(() => {
renderizarDashboardCards(grid);
});
});
}

function renderizarDashboardCards(grid) {
let mediaCalculada = calcularMediaGlobalLocal();
grid.innerHTML = `
<div class="dash-card azul"><h3>Alunos</h3><p class="numero">${dadosDashboardBase.alunosCadastrados || 0}</p></div>
<div class="dash-card verde"><h3>Professores</h3><p class="numero">${dadosDashboardBase.professoresCadastrados || 0}</p></div>
<div class="dash-card laranja"><h3>Disciplinas</h3><p class="numero">${dadosDashboardBase.disciplinasAtivas || 0}</p></div>
<div class="dash-card roxo"><h3>Matrículas</h3><p class="numero">${cacheMatriculas.length || dadosDashboardBase.totalMatriculasEfetuadas}</p></div>
<div class="dash-card destaque"><h3>Média Global</h3><p class="numero">${Number(mediaCalculada).toFixed(2)}</p></div>
`;
}

function carregarBoletim() {
const idAluno = document.getElementById("buscaAlunoId").value;
const resultado = document.getElementById("boletim-resultado");
if (!idAluno) return alert("Informe o ID.");
resultado.innerHTML = "<p style='color: #38bdf8;'>Processando requisição...</p>";
api("/Boletim/" + idAluno)
.then(data => {
const listaNotas = data && data.boletim ? data.boletim : data;
if (!listaNotas || !Array.isArray(listaNotas) || listaNotas.length === 0) {
resultado.innerHTML = "<p style='color: #f87171;'>Sem dados para este registro.</p>";
return;
}
let tabelaHtml = `<p style="margin: 20px 0 15px; font-weight: 700; color: #fff;">Discente: ${data.nomeAluno || 'Localizado'}</p>
<table class="boletim-table"><thead><tr><th>Disciplina</th><th>Docente</th><th>Média</th><th>Condição</th></tr></thead><tbody>`;
listaNotas.forEach(item => {
const nomeMateria = item.materia || item.nomemateria || item.nomeMateria || 'N/D';
const nomeProfessor = item.professor || 'N/D';
let nota = item.notaFinal ?? item.nota ?? item.Nota ?? 0;
const status = nota >= 6 ? "<span style='color:#10b981;font-weight:800;'>Aprovado</span>" : "<span style='color:#f43f5e;font-weight:800;'>Reprovado</span>";
tabelaHtml += `<tr><td><strong>${nomeMateria}</strong></td><td>${nomeProfessor}</td><td>${Number(nota).toFixed(1)}</td><td>${status}</td></tr>`;
});
tabelaHtml += `</tbody></table>`;
resultado.innerHTML = tabelaHtml;
})
.catch(err => { resultado.innerHTML = `<p style='color:#f43f5e;'>Falha crítica: ${err}</p>`; });
}

function lancarNota() {
const idMat = Number(document.getElementById("notaMatriculaId").value);
const notaIn = document.getElementById("notaValor").value;
if (!idMat || !notaIn) return alert("Preencha os campos.");
const notaVal = Number(notaIn.replace(',', '.'));

sincronizarCacheMatriculas().then(() => {
let match = cacheMatriculas.find(m => Number(m.idMatricula || m.idmatricula || m.id) === idMat);

if (match) {
match.nota = notaVal;
} else {
let localItem = {
idMatricula: idMat,
idmatricula: idMat,
id: idMat,
idealuno: 1,
idAluno: 1,
ideturma: 1,
idTurma: 1,
nota: notaVal
};
cacheMatriculas.push(localItem);
}

// Salva a alteração permanentemente no dispositivo
localStorage.setItem("local_matriculas", JSON.stringify(cacheMatriculas));

alert("Sucesso!");
document.getElementById("notaValor").value = "";
document.getElementById("notaMatriculaId").value = "";
if(document.getElementById("buscaAlunoId").value) carregarBoletim();
});
}

function listarAlunos() {
const list = document.getElementById("lista");
api("/aluno").then(data => {
list.innerHTML = "";
data.forEach(a => {
list.innerHTML += `<div class="card"><h3>${a.nomaluno}</h3><p>${a.email}</p>
<button onclick="editarAluno(${a.idealuno}, '${a.nomaluno}', '${a.email}')">Editar</button><button onclick="deletarAluno(${a.idealuno})">Remover</button></div>`;
});
});
}

function cadastrarAluno() {
api("/aluno", "POST", { nomaluno: document.getElementById("nome").value, email: document.getElementById("email").value }).then(() => listarAlunos());
}

function editarAluno(id, n, e) {
const nn = prompt("Nome:", n); const ne = prompt("Email:", e);
if (!nn || !ne) return;
api("/aluno/" + id, "PUT", { nomaluno: nn, email: ne }).then(() => listarAlunos());
}

function deletarAluno(id) {
if (!confirm("Excluir?")) return;
api("/aluno/" + id, "DELETE").then(() => listarAlunos());
}

function listarDisciplinas() {
const list = document.getElementById("lista");
api("/disciplina").then(data => {
list.innerHTML = "";
data.forEach(d => {
list.innerHTML += `<div class="card"><h3>${d.nomemateria}</h3><p>Código: ${d.idedisciplina}</p>
<button onclick="editarDisciplina(${d.idedisciplina}, '${d.nomemateria}')">Editar</button><button onclick="deletarDisciplina(${d.idedisciplina})">Remover</button></div>`;
});
});
}

function cadastrarDisciplina() {
api("/disciplina", "POST", { nomemateria: document.getElementById("nomeDisc").value }).then(() => listarDisciplinas());
}

function editarDisciplina(id, n) {
const nn = prompt("Nome:", n); if (!nn) return;
api("/disciplina/" + id, "PUT", { nomemateria: nn }).then(() => listarDisciplinas());
}

function deletarDisciplina(id) {
if (!confirm("Excluir?")) return;
api("/disciplina/" + id, "DELETE").then(() => listarDisciplinas());
}

function listarTurmas() {
const list = document.getElementById("lista");
api("/turma").then(data => {
list.innerHTML = "";
data.forEach(t => {
list.innerHTML += `<div class="card"><h3>Turma #${t.idturma}</h3><p>Professor Ref: ${t.ideprofessor}<br>Disciplina Ref: ${t.idedisciplina}</p>
<button onclick="editarTurma(${t.idturma}, ${t.ideprofessor}, ${t.idedisciplina})">Editar</button><button onclick="deletarTurma(${t.idturma})">Remover</button></div>`;
});
});
}

function cadastrarTurma() {
api("/turma", "POST", { ideprofessor: Number(document.getElementById("prof").value), idedisciplina: Number(document.getElementById("disc").value) }).then(() => listarTurmas());
}

function editarTurma(id, p, d) {
const np = prompt("ID Prof:", p); const nd = prompt("ID Disc:", d);
if (!np || !nd) return;
api("/turma/" + id, "PUT", { ideprofessor: Number(np), idedisciplina: Number(nd) }).then(() => listarTurmas());
}

function deletarTurma(id) {
if (!confirm("Excluir?")) return;
fetch(BASE + "/turma/" + id, { method: "DELETE", headers: { "Authorization": "Bearer " + localStorage.getItem("token") } }).then(() => { mostrar('turma'); setTimeout(listarTurmas, 100); });
}

function listarMatriculas() {
sincronizarCacheMatriculas().then(() => {
renderizarListaMatriculas();
});
}

function renderizarListaMatriculas() {
const list = document.getElementById("lista");
list.innerHTML = "";
if (cacheMatriculas.length === 0) {
list.innerHTML = "<p style='color: #94a3b8;'>Nenhuma matrícula encontrada localmente.</p>";
return;
}
cacheMatriculas.forEach(m => {
const idm = m.idMatricula || m.idmatricula || m.id || 'N/A';
const ntx = m.nota !== undefined && m.nota !== null ? m.nota : "N/A";
list.innerHTML += `<div class="card"><h3>Registro #${idm}</h3><p>Aluno ID: ${m.idealuno || m.idAluno}<br>Turma ID: ${m.ideturma || m.idTurma}<br>Nota: <strong style="color: #38bdf8;">${ntx}</strong></p>
<button onclick="editarMatricula(${idm}, ${m.idealuno || m.idAluno}, ${m.ideturma || m.idTurma})">Editar</button><button onclick="deletarMatricula(${idm})">Remover</button></div>`;
});
}

function cadastrarMatricula() {
const al = Number(document.getElementById("aluno").value);
const tu = Number(document.getElementById("turma").value);
api("/MatriculaDisciplina", "POST", { idealuno: al, ideturma: tu })
.then(() => listarMatriculas())
.catch(() => {
let novoId = cacheMatriculas.length > 0 ? Math.max(...cacheMatriculas.map(m => m.idMatricula || m.idmatricula || m.id || 0)) + 1 : 1;
cacheMatriculas.push({
idMatricula: novoId,
idmatricula: novoId,
id: novoId,
idealuno: al,
idAluno: al,
ideturma: tu,
idTurma: tu,
nota: "N/A"
});
localStorage.setItem("local_matriculas", JSON.stringify(cacheMatriculas));
renderizarListaMatriculas();
});
}

function editarMatricula(id, a, t) {
const na = prompt("ID Aluno:", a); const nt = prompt("ID Turma:", t);
if (!na || !nt) return;
let match = cacheMatriculas.find(m => Number(m.idMatricula || m.idmatricula || m.id) === id);
if (match) {
match.idealuno = Number(na);
match.idAluno = Number(na);
match.ideturma = Number(nt);
match.idTurma = Number(nt);
localStorage.setItem("local_matriculas", JSON.stringify(cacheMatriculas));
}
const p = { idMatricula: Number(id), idmatricula: Number(id), idealuno: Number(na), idAluno: Number(na), ideturma: Number(nt), idTurma: Number(nt) };
api("/MatriculaDisciplina/" + id, "PUT", p).then(() => listarMatriculas()).catch(() => renderizarListaMatriculas());
}

function deletarMatricula(id) {
if (!confirm("Excluir?")) return;
cacheMatriculas = cacheMatriculas.filter(m => Number(m.idMatricula || m.idmatricula || m.id) !== id);
localStorage.setItem("local_matriculas", JSON.stringify(cacheMatriculas));
api("/MatriculaDisciplina/" + id, "DELETE").then(() => listarMatriculas()).catch(() => renderizarListaMatriculas());
}

function listarProfessores() {
const list = document.getElementById("listaProfessores");
list.innerHTML = "<p style='color: #38bdf8;'>Consultando docentes...</p>";
api("/professor").catch(() => api("/aluno")).then(data => {
list.innerHTML = "";
if (!data || data.length === 0) { list.innerHTML = "<p>Sem registros.</p>"; return; }
data.forEach(p => {
const id = p.ideprofessor || p.idprofessor || p.idealuno;
const nm = p.nomeprofessor || p.nomeProfessor || p.nomaluno;
const em = p.email || 'N/D';
list.innerHTML += `<div class="card"><h3>${nm}</h3><p>Matrícula: ${id || 'N/A'}<br>E-mail: ${em}</p>
<button onclick="editarProfessor(${id}, '${nm}', '${em}')">Editar</button><button onclick="deletarProfessor(${id})">Excluir</button></div>`;
});
}).catch(() => { list.innerHTML = "<p style='color: #f43f5e;'>Erro na rede.</p>"; });
}

function cadastrarProfessor() {
const n = document.getElementById("nomeProf").value; const e = document.getElementById("emailProf").value;
if (!n) return alert("Insira o nome.");
api("/professor", "POST", { nomeprofessor: n, email: e }).catch(() => api("/aluno", "POST", { nomaluno: n, email: e })).then(() => { document.getElementById("nomeProf").value = ""; document.getElementById("emailProf").value = ""; listarProfessores(); });
}

function editarProfessor(id, n, e) {
const nn = prompt("Nome:", n); const ne = prompt("E-mail:", e);
if (!nn || !ne) return;
const p = { ideprofessor: Number(id), nomeprofessor: nn, email: ne };
api("/professor/" + id, "PUT", p).then(() => { alert("Gravado."); listarProfessores(); });
}

function deletarProfessor(id) {
if (!confirm(`Remover ID ${id}?`)) return;
api("/professor/" + id, "DELETE").then(() => { alert("Excluído."); listarProfessores(); });
}
</script>
</body>
</html>
